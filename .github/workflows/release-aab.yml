name: Release AAB to Play

# Builds a signed Android App Bundle and (optionally) publishes it to Google Play.
#
# Required repository secrets:
#   Signing (same ones used by release-apk.yml):
#     KEYSTORE_PRIVATE   - PEM private key for the upload key
#     KEYSTORE_CHAIN     - PEM certificate chain for the upload key
#     KEYSTORE_PASSWORD  - keystore password
#     KEY_ALIAS          - key alias
#     KEY_PASSWORD       - key password
#   Play publishing:
#     PLAY_SERVICE_ACCOUNT_JSON - the full JSON of a Google Cloud service account that has been
#       granted release permissions in the Play Console (Users & permissions). See SETUP below.
#
# SETUP (one-time):
#   1. Play Console → create the app, then enroll in Play App Signing (default). Sign with the
#      upload key above; Google holds the app-signing key.
#   2. Google Cloud Console → create a service account, create a JSON key, paste the JSON into the
#      PLAY_SERVICE_ACCOUNT_JSON secret. In the Play Console, invite that service account and grant
#      it "Release to testing tracks" (and Production if you intend to publish there).
#   3. FIRST UPLOAD MUST BE MANUAL: Google's API cannot create the very first release for a new app.
#      Upload one AAB by hand in the Play Console once; after that this workflow can publish.
#
# versionCode is derived from the git commit count (-PversionBuild), so it always increases.

on:
  push:
  workflow_dispatch:
    inputs:
      track:
        description: "Play track to publish to"
        type: choice
        default: internal
        options: [internal, alpha, beta, production]
      status:
        default: completed
      publish:
        default: true

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Generate keystore from secrets
        env:
          KEYSTORE_PRIVATE: ${{ secrets.KEYSTORE_PRIVATE }}
          KEYSTORE_CHAIN: ${{ secrets.KEYSTORE_CHAIN }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        run: |
          echo "$KEYSTORE_PRIVATE" > private_key.pem
          echo "$KEYSTORE_CHAIN" > certificate_chain.crt
          openssl pkcs12 -export -in certificate_chain.crt -inkey private_key.pem \
            -name "$KEY_ALIAS" -out keystore.p12 \
            -password pass:"$KEYSTORE_PASSWORD"
          keytool -importkeystore -srckeystore keystore.p12 -srcstoretype PKCS12 \
            -destkeystore app/keystore.jks -deststoretype JKS \
            -srcstorepass "$KEYSTORE_PASSWORD" \
            -deststorepass "$KEYSTORE_PASSWORD" \
            -alias "$KEY_ALIAS" -noprompt
          rm private_key.pem certificate_chain.crt keystore.p12

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          cache-read-only: false
          dependency-graph: disabled

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build signed AAB
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: |
          # version.properties auto-increments inside the build — no version override is passed.
          ./gradlew bundleRelease \
            -Pandroid.injected.signing.store.file=$(pwd)/app/keystore.jks \
            -Pandroid.injected.signing.store.password=$KEYSTORE_PASSWORD \
            -Pandroid.injected.signing.key.alias=$KEY_ALIAS \
            -Pandroid.injected.signing.key.password=$KEY_PASSWORD

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: release-aab
          path: app/build/outputs/bundle/release/*.aab
          if-no-files-found: error

      - name: Publish to Google Play
        if: ${{ inputs.publish }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.hereliesaz.guillotine
          releaseFiles: app/build/outputs/bundle/release/*.aab
          track: ${{ inputs.track }}
          status: ${{ inputs.status }}
